White hunters move on song beats.<br>

const N = 32;
const MIN_N = 8;
const S = 20;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("audio");

let gameOver = false;

let prey = {
    x: 16,
    y: 16
};

let lives = 3;
let invulnerableUntil = 0;

let hunters = [
    {x:0,y:0},{x:31,y:0},{x:0,y:31},{x:31,y:31},
    {x:15,y:0},{x:0,y:15},{x:31,y:15},{x:15,y:31},
    {x:7,y:0},{x:23,y:0},{x:0,y:7},{x:0,y:23},
    {x:31,y:7},{x:31,y:23},{x:7,y:31},{x:23,y:31}
];

let beatIndex = 0;

let lavaLayer = 0;
let nextShrinkBeat = 0;

const pressed = new Set();

document.addEventListener("keydown", e => {

    if (gameOver) return;

    if (pressed.has(e.code)) return;
    pressed.add(e.code);

    let dx = 0;
    let dy = 0;

    if (e.key === "a")  dx = -1;
    if (e.key === "d") dx = 1;
    if (e.key === "w")    dy = -1;
    if (e.key === "s")  dy = 1;

    const min = lavaLayer;
    const max = N - lavaLayer - 1;

    prey.x = Math.max(min, Math.min(max, prey.x + dx));
    prey.y = Math.max(min, Math.min(max, prey.y + dy));
});

document.addEventListener("keyup", e => {
    pressed.delete(e.code);
});

function lose(message) {
    gameOver = true;
    audio.pause();

    ctx.fillStyle = "red";
    ctx.font = "48px sans-serif";
    ctx.fillText(message, 160, 320);
}

function moveHunters() {

    const occupied = new Set();

    for (const h of hunters) occupied.add(`${h.x},${h.y}`);

    for (const h of hunters) {

        occupied.delete(`${h.x},${h.y}`);

        const dx = prey.x - h.x;
        const dy = prey.y - h.y;

        const candidates = [];

        if (Math.abs(dx) >= Math.abs(dy)) {
            if (dx) candidates.push({x:h.x+Math.sign(dx),y:h.y});
            if (dy) candidates.push({x:h.x,y:h.y+Math.sign(dy)});
        } else {
            if (dy) candidates.push({x:h.x,y:h.y+Math.sign(dy)});
            if (dx) candidates.push({x:h.x+Math.sign(dx),y:h.y});
        }

        for (const c of candidates) {
            const key = `${c.x},${c.y}`;
            if (!occupied.has(key)) {
                h.x = c.x;
                h.y = c.y;
                occupied.add(key);
                break;
            }
        }

        occupied.add(`${h.x},${h.y}`);
    }

    const remainingSize = N - lavaLayer * 2;

    let beatsPerShrink;
    if (remainingSize > 24) beatsPerShrink = 24;
    else if (remainingSize > 20) beatsPerShrink = 16;
    else if (remainingSize > 16) beatsPerShrink = 12;
    else if (remainingSize > 12) beatsPerShrink = 8;
    else beatsPerShrink = 4;

    if (beatIndex >= nextShrinkBeat + beatsPerShrink && remainingSize > MIN_N) {
        lavaLayer++;
        nextShrinkBeat = beatIndex;
    }
}

function drawBoard() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < N; y++) {
        for (let x = 0; x < N; x++) {

            const lava =
                x < lavaLayer ||
                y < lavaLayer ||
                x >= N - lavaLayer ||
                y >= N - lavaLayer;

            if (lava) {
                ctx.fillStyle = "#ff5500";
                ctx.fillRect(x*S, y*S, S, S);
            }

            ctx.strokeStyle = "#555";
            ctx.strokeRect(x*S, y*S, S, S);
        }
    }

    if (
        performance.now() < invulnerableUntil &&
        Math.floor(performance.now()/100)%2
    ) ctx.globalAlpha = 0.3;

    ctx.fillStyle = "gold";
    ctx.fillRect(prey.x*S+2,prey.y*S+2,S-4,S-4);
    ctx.globalAlpha = 1;

    ctx.fillStyle = "white";

    for (const h of hunters) {

        ctx.fillRect(
            h.x*S + 6,
            h.y*S + 6,
            S - 12,
            S - 12
        );

        if (
            h.x === prey.x &&
            h.y === prey.y &&
            performance.now() > invulnerableUntil
        ) {
            lives--;
            invulnerableUntil = performance.now() + 2000;
            prey.x = Math.floor(N/2);
            prey.y = Math.floor(N/2);
            if (lives <= 0) lose("CAUGHT");
        }
    }

    if (
        prey.x < lavaLayer ||
        prey.y < lavaLayer ||
        prey.x >= N - lavaLayer ||
        prey.y >= N - lavaLayer
    ) {

        if (performance.now() > invulnerableUntil) {

            lives--;
            invulnerableUntil = performance.now() + 2000;

            prey.x = Math.floor(N/2);
            prey.y = Math.floor(N/2);

            if (lives <= 0) {
                lose("BURNED");
            }
        }
    }

    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";

    const currentSize = N - lavaLayer * 2;

    ctx.fillText(
        `Board: ${currentSize}×${currentSize}`,
        10,
        24
    );

    ctx.fillText(`Lives: ${lives}`,10,48);
}

function loop() {

    if (!gameOver) {

        const t = audio.currentTime;

        while (
            beatIndex < beats.length &&
            t >= beats[beatIndex]
        ) {
            moveHunters();
            beatIndex++;
        }

        drawBoard();

        if (
            beatIndex >= beats.length &&
            !audio.paused &&
            audio.currentTime > 0
        ) {
            gameOver = true;
            ctx.fillStyle = "lime";
            ctx.font = "48px sans-serif";
            ctx.fillText("YOU SURVIVED",120,320);
        }
    }

    requestAnimationFrame(loop);
}

drawBoard();
loop();

</script>
